skill:
  name: icon-designer
  description: Generate app icon via Nano Banana Pro API with template-based fallback; produce full icon set at all required sizes
  version: "1.0.0"
  tags:
    - app-factory
    - icon
    - design
    - submission

model: claude-sonnet-4-6
timeout_seconds: 120
max_tokens: 4000

tools:
  - read_file
  - write_file
  - list_directory
  - shell

permissions:
  filesystem:
    read:
      - app-factory/state/
      - app-factory/projects/
      - app-factory/logs/
    write:
      - app-factory/state/
      - app-factory/projects/
      - app-factory/logs/live-feed.log
  network:
    allowed_domains:
      - api.nanobananapro.com
  shell: false

environment:
  optional:
    - NANO_BANANA_API_KEY
    - NANO_BANANA_API_URL
