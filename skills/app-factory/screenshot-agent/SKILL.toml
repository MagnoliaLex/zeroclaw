[skill]
name = "screenshot-agent"
description = "Automated iOS simulator screenshots for required App Store sizes: iPhone 6.7\", iPhone 6.1\", iPad 12.9\""
version = "1.0.0"
author = "zeroclaw"
tags = ["app-factory", "screenshots", "simulator", "submission"]

